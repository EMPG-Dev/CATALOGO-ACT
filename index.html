<!DOCTYPE html>
<html lang="es">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0, maximum-scale=1.0, user-scalable=no, viewport-fit=cover">
    <title>E_M_P_G | Business Store</title>
    <link rel="manifest" href="manifest.json">
    <meta name="theme-color" content="#0f172a">

    <style>
        :root {
            --dark: #0f172a; --mid: #1e293b; --accent: #3b82f6; --accent2: #2563eb;
            --ws: #16a34a; --danger: #dc2626; --bg: #f1f5f9; --card: #ffffff;
            --text: #0f172a; --muted: #64748b; --border: #e2e8f0;
        }
        *,*::before,*::after{box-sizing:border-box;margin:0;padding:0;-webkit-tap-highlight-color:transparent}
        html,body{height:100%;font-family:'Segoe UI',sans-serif;background:var(--bg);color:var(--text);overflow:hidden}

        /* Fondo Animado */
        @keyframes gradientBG { 0% { background-position: 0% 50%; } 50% { background-position: 100% 50%; } 100% { background-position: 0% 50%; } }
        .main-screen {
            height: 100dvh; display: flex; align-items: center; justify-content: center; padding: 24px;
            background: linear-gradient(-45deg, #0f172a, #1e3a8a, #1e293b, #3b82f6);
            background-size: 400% 400%; animation: gradientBG 15s ease infinite;
        }

        .card-inicio{background:rgba(255,255,255,0.06);border:1px solid rgba(255,255,255,0.1);backdrop-filter:blur(24px);padding:44px 28px;border-radius:28px;text-align:center;width:100%;max-width:380px}
        .btn-entrar{display:block;width:100%;padding:17px;background:var(--accent);color:#fff;border:none;border-radius:50px;font-size:1rem;font-weight:700;margin-top:20px}

        /* Overlay Catálogo */
        #catalogo-overlay{position:fixed;inset:0;background:var(--bg);z-index:9999;transform:translateY(100%);transition:0.4s cubic-bezier(0.32,0.72,0,1);display:flex;flex-direction:column}
        #catalogo-overlay.active{transform:translateY(0)}

        .header{padding:15px;background:var(--dark);display:flex;justify-content:space-between;align-items:center;color:#fff}
        .search-bar{width:100%;padding:10px 15px;border-radius:12px;border:none;background:rgba(255,255,255,0.1);color:#fff;margin:10px 15px}

        .content{flex:1;overflow-y:auto;padding:15px}
        .grid{display:grid;grid-template-columns:1fr 1fr;gap:12px}
        .card-prod{background:var(--card);border-radius:18px;padding:12px;border:1px solid var(--border);position:relative}
        .img-prod{width:100%;height:100px;border-radius:10px;object-fit:cover;margin-bottom:8px}

        /* Boton Flotante Carrito */
        .cart-float{position:fixed;bottom:25px;right:20px;background:var(--accent);color:#fff;width:60px;height:60px;border-radius:50%;display:flex;align-items:center;justify-content:center;box-shadow:0 8px 20px rgba(0,0,0,0.2);z-index:10000}
        .cart-count{position:absolute;top:0;right:0;background:var(--danger);font-size:0.7rem;padding:4px 8px;border-radius:20px}

        /* Modal Ticket */
        .modal{position:fixed;inset:0;background:rgba(0,0,0,0.7);z-index:20000;display:none;align-items:center;justify-content:center;padding:20px}
        .modal-content{background:#fff;width:100%;max-width:400px;border-radius:25px;padding:25px;max-height:85vh;overflow-y:auto}
        .ticket{font-family:'Courier New', Courier, monospace;background:#f8f9fa;padding:15px;border:1px dashed #ccc;margin:15px 0}
        
        input, select{width:100%;padding:12px;margin-bottom:10px;border-radius:10px;border:1.5px solid var(--border)}
        .btn-ws{background:var(--ws);color:#fff;width:100%;padding:15px;border:none;border-radius:12px;font-weight:700;cursor:pointer}
        .btn-add{background:var(--accent);color:#fff;border:none;width:100%;padding:8px;border-radius:8px;font-weight:700}
    </style>
</head>
<body>

    <div class="main-screen">
        <div class="card-inicio">
            <h1 style="color:#fff;letter-spacing:5px">E_M_P_G</h1>
            <p style="color:rgba(255,255,255,0.6)">Catálogo & Carrito de Ventas</p>
            <button class="btn-entrar" onclick="abrirApp()">Ver Productos</button>
        </div>
    </div>

    <div id="catalogo-overlay">
        <div class="header">
            <span id="logoAdmin" style="font-weight:900">E_M_P_G</span>
            <button onclick="cerrarApp()" style="background:none;border:none;color:#fff">Cerrar</button>
        </div>
        <input type="text" id="searchInput" class="search-bar" placeholder="Buscar productos..." oninput="render()">
        
        <div class="content">
            <div id="catalogo-container"></div>
        </div>

        <div class="cart-float" onclick="abrirCarrito()">
            🛒 <span class="cart-count" id="cartCount">0</span>
        </div>
    </div>

    <div id="modalCarrito" class="modal">
        <div class="modal-content">
            <h3>Tu Pedido</h3>
            <div id="ticketArea" class="ticket"></div>
            
            <p style="font-size:0.8rem; font-weight:700; margin-bottom:10px">DATOS DE ENTREGA:</p>
            <input type="text" id="custNombre" placeholder="Tu Nombre Completo">
            <input type="text" id="custDireccion" placeholder="Dirección de Entrega">
            <input type="tel" id="custTel" placeholder="Tu Teléfono">
            
            <button class="btn-ws" onclick="enviarPedido()">Enviar Orden por WhatsApp</button>
            <button onclick="cerrarCarrito()" style="width:100%;background:none;border:none;margin-top:15px;color:var(--muted)">Seguir Comprando</button>
        </div>
    </div>

    <div id="adminPanel" class="modal" style="display:none; background:rgba(15, 23, 42, 0.9);">
        <div class="modal-content">
            <h4>Panel de Control</h4>
            <input type="text" id="admNombre" placeholder="Nombre del Producto">
            <input type="number" id="admPrecio" placeholder="Precio $">
            <input type="file" id="admFile" accept="image/*">
            <select id="admMarca">
                <option value="TERRAMAR">TERRAMAR</option>
                <option value="FARMASI">FARMASI</option>
                <option value="YANBAL">YANBAL</option>
                <option value="OTRO">OTRO</option>
            </select>
            <button class="btn-add" onclick="guardarProducto()">Subir a la Nube Local</button>
            <button onclick="cerrarAdmin()" style="width:100%;background:none;border:none;margin-top:15px">Salir</button>
        </div>
    </div>

    <div id="toast"></div>

    <script>
        var CONFIG = { 
            phone: "527121919227", 
            secretCode: "DAYANA123456", 
            tienda: "E_M_P_G | Studio Celaya",
            marcas: ["TERRAMAR", "FARMASI", "YANBAL", "OTRO"]
        };

        var carrito = [];
        var isAdmin = false;

        function abrirApp() { document.getElementById("catalogo-overlay").classList.add("active"); }
        function cerrarApp() { document.getElementById("catalogo-overlay").classList.remove("active"); }

        // --- LÓGICA DEL CARRITO ---
        function agregarAlCarrito(id) {
            var prods = getProds();
            var p = prods.find(item => item.id === id);
            carrito.push(p);
            actualizarContador();
            toast("Agregado al ticket");
        }

        function actualizarContador() {
            document.getElementById("cartCount").textContent = carrito.length;
        }

        function abrirCarrito() {
            if (carrito.length === 0) return toast("El carrito está vacío");
            document.getElementById("modalCarrito").style.display = "flex";
            dibujarTicket();
        }

        function cerrarCarrito() { document.getElementById("modalCarrito").style.display = "none"; }

        function dibujarTicket() {
            var total = 0;
            var html = `<b>${CONFIG.tienda}</b><br>`;
            html += `-------------------------<br>`;
            carrito.forEach((p, index) => {
                html += `${p.nombre.substring(0,15)}... $${p.precio}<br>`;
                total += parseFloat(p.precio);
            });
            html += `-------------------------<br>`;
            html += `<b>TOTAL: $${total.toLocaleString()}</b><br><br>`;
            html += `<small>Entrega: Pendiente confirmar</small>`;
            document.getElementById("ticketArea").innerHTML = html;
        }

        function enviarPedido() {
            var nombre = document.getElementById("custNombre").value;
            var dir = document.getElementById("custDireccion").value;
            if(!nombre || !dir) return toast("Llena tus datos de envío");

            var total = 0;
            var msg = `*ORDEN DE COMPRA - ${CONFIG.tienda}*\n\n`;
            msg += `*Cliente:* ${nombre}\n`;
            msg += `*Dirección:* ${dir}\n`;
            msg += `--------------------------\n`;
            
            carrito.forEach(p => {
                msg += `- ${p.nombre}: $${p.precio}\n`;
                total += parseFloat(p.precio);
            });
            
            msg += `--------------------------\n`;
            msg += `*TOTAL A PAGAR: $${total}*\n\n`;
            msg += `_El administrador confirmará la entrega estimada en breve._`;

            window.open(`https://wa.me/${CONFIG.phone}?text=${encodeURIComponent(msg)}`);
            carrito = [];
            actualizarContador();
            cerrarCarrito();
        }

        // --- LÓGICA DE DATOS ---
        function getProds() { return JSON.parse(localStorage.getItem("empg_v2")) || []; }
        function setProds(arr) { localStorage.setItem("empg_v2", JSON.stringify(arr)); }

        function render() {
            var container = document.getElementById("catalogo-container");
            var query = document.getElementById("searchInput").value.toLowerCase();
            container.innerHTML = "";
            var prods = getProds();

            CONFIG.marcas.forEach(marca => {
                var filtrados = prods.filter(p => p.marca === marca && p.nombre.toLowerCase().includes(query));
                if (filtrados.length === 0 && !isAdmin) return;

                var sec = document.createElement("div");
                sec.innerHTML = `<h5 style="margin:20px 0 10px; color:var(--accent)">${marca}</h5><div class="grid"></div>`;
                var grid = sec.querySelector(".grid");

                filtrados.forEach(p => {
                    var card = document.createElement("div");
                    card.className = "card-prod";
                    card.innerHTML = `
                        <img class="img-prod" src="${p.imagen || ''}">
                        <p style="font-size:0.8rem;font-weight:700">${p.nombre}</p>
                        <b style="font-size:1.1rem">$${p.precio}</b>
                        <button class="btn-add" onclick="agregarAlCarrito(${p.id})">+ Carrito</button>
                        ${isAdmin ? `<button onclick="eliminar(${p.id})" style="color:red;border:none;background:none;font-size:0.6rem">Eliminar</button>` : ''}
                    `;
                    grid.appendChild(card);
                });
                container.appendChild(sec);
            });
        }

        function guardarProducto() {
            var n = document.getElementById("admNombre").value;
            var p = document.getElementById("admPrecio").value;
            var m = document.getElementById("admMarca").value;
            var file = document.getElementById("admFile").files[0];

            if(!n || !p) return toast("Faltan datos");

            const save = (img) => {
                var arr = getProds();
                arr.push({ id: Date.now(), nombre: n, precio: p, marca: m, imagen: img });
                setProds(arr);
                toast("Producto guardado");
                render();
            };

            if(file) {
                var r = new FileReader(); r.onload = (e) => save(e.target.result); r.readAsDataURL(file);
            } else { save(""); }
        }

        // --- ADMIN LOGIN (Presiona logo 2s) ---
        var pTimer;
        var logo = document.getElementById("logoAdmin");
        logo.addEventListener("mousedown", () => pTimer = setTimeout(pedirCodigo, 2000));
        logo.addEventListener("touchstart", () => pTimer = setTimeout(pedirCodigo, 2000));
        logo.addEventListener("mouseup", () => clearTimeout(pTimer));
        
        function pedirCodigo() {
            if(prompt("Pass:") === CONFIG.secretCode) {
                isAdmin = true;
                document.getElementById("adminPanel").style.display = "flex";
                render();
            }
        }
        function cerrarAdmin() { isAdmin = false; document.getElementById("adminPanel").style.display = "none"; render(); }

        function toast(m) { 
            var t = document.getElementById("toast"); 
            t.textContent = m; t.className = "visible"; 
            setTimeout(() => t.className = "", 2000); 
        }

        window.onload = render;
    </script>

    <style>
        #toast{position:fixed;bottom:100px;left:50%;transform:translateX(-50%);background:#333;color:#fff;padding:10px 20px;border-radius:20px;opacity:0;transition:0.3s;z-index:99999}
        #toast.visible{opacity:1}
    </style>
</body>
</html>
