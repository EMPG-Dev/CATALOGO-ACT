<!DOCTYPE html>
<html lang="es">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0, maximum-scale=1.0, user-scalable=no, viewport-fit=cover">
    <title>DIANA PLATA | Studio</title>
    <link rel="manifest" href="manifest.json">
    <meta name="theme-color" content="#F5F5F7">
    <style>
        * {
            margin: 0;
            padding: 0;
            box-sizing: border-box;
            -webkit-tap-highlight-color: transparent;
        }

        :root {
            --bg-neutral: #F5F5F7;
            --card-white: #FFFFFF;
            --text-primary: #1C1C1E;
            --text-secondary: #6C6C70;
            --gold: #C5A059;
            --gold-dark: #9E7B3C;
            --silver: #B0B3B8;
            --silver-dark: #8E8E93;
            --silver-light: #E4E6EB;
            --border-light: #E9E9EF;
            --danger: #D9534F;
            --success: #2C6E4F;
            --shadow-sm: 0 2px 8px rgba(0, 0, 0, 0.02), 0 4px 12px rgba(0, 0, 0, 0.03);
            --shadow-md: 0 8px 24px rgba(0, 0, 0, 0.05);
        }

        body, html {
            height: 100%;
            font-family: 'Inter', system-ui, -apple-system, 'Segoe UI', sans-serif;
            background: var(--bg-neutral);
            color: var(--text-primary);
            overflow: hidden;
        }

        /* Pantalla de inicio minimalista */
        .main-screen {
            height: 100dvh;
            display: flex;
            align-items: center;
            justify-content: center;
            padding: 24px;
            background: linear-gradient(125deg, #F9F9FB 0%, #EDEDF0 100%);
            position: relative;
        }

        .main-screen::before {
            content: "✦";
            font-size: 200px;
            color: var(--silver-light);
            position: absolute;
            bottom: 10px;
            right: 10px;
            opacity: 0.25;
            pointer-events: none;
        }

        .card-inicio {
            background: rgba(255, 255, 255, 0.96);
            backdrop-filter: blur(2px);
            border-radius: 42px;
            padding: 48px 32px;
            text-align: center;
            width: 100%;
            max-width: 380px;
            border: 1px solid rgba(197, 160, 89, 0.25);
            box-shadow: var(--shadow-md);
        }

        .card-inicio h1 {
            font-size: 2rem;
            font-weight: 500;
            letter-spacing: 1px;
            background: linear-gradient(135deg, var(--gold-dark), var(--silver-dark));
            -webkit-background-clip: text;
            background-clip: text;
            color: transparent;
            margin-bottom: 8px;
            font-family: 'Playfair Display', serif;
        }

        .card-inicio p {
            color: var(--text-secondary);
            font-weight: 400;
            font-size: 0.9rem;
        }

        .btn-entrar {
            background: linear-gradient(90deg, var(--gold), var(--silver));
            border: none;
            padding: 14px 28px;
            border-radius: 50px;
            font-weight: 600;
            font-size: 1rem;
            color: white;
            width: 100%;
            margin-top: 32px;
            cursor: pointer;
            transition: all 0.2s ease;
            box-shadow: 0 2px 6px rgba(0,0,0,0.1);
        }

        .btn-entrar:active { transform: scale(0.97); opacity: 0.9; }

        /* Overlay Catálogo */
        #catalogo-overlay {
            position: fixed;
            inset: 0;
            background: var(--bg-neutral);
            z-index: 9999;
            transform: translateY(100%);
            transition: 0.35s cubic-bezier(0.2, 0.9, 0.3, 1.1);
            display: flex;
            flex-direction: column;
        }

        #catalogo-overlay.active {
            transform: translateY(0);
        }

        /* Header con toques plateados */
        .header {
            padding: 16px 20px;
            background: var(--card-white);
            border-bottom: 1px solid var(--border-light);
            display: flex;
            justify-content: space-between;
            align-items: center;
        }

        #logoAdmin {
            font-family: 'Playfair Display', serif;
            font-size: 1.5rem;
            font-weight: 600;
            background: linear-gradient(135deg, var(--gold-dark), var(--silver-dark));
            -webkit-background-clip: text;
            background-clip: text;
            color: transparent;
            letter-spacing: 0.5px;
            cursor: pointer;
        }

        .search-bar {
            background: var(--card-white);
            border: 1px solid var(--border-light);
            border-radius: 44px;
            padding: 12px 18px;
            margin: 12px 16px;
            font-size: 0.9rem;
            box-shadow: var(--shadow-sm);
        }

        /* Tabs */
        .tabs {
            display: flex;
            gap: 12px;
            padding: 8px 16px;
            background: transparent;
            margin: 0 12px;
        }

        .tab {
            flex: 1;
            background: transparent;
            border: none;
            padding: 10px 0;
            border-radius: 40px;
            font-weight: 500;
            color: var(--text-secondary);
            transition: 0.2s;
            cursor: pointer;
            font-size: 0.9rem;
        }

        .tab.active {
            background: linear-gradient(95deg, var(--gold), var(--silver));
            color: white;
            box-shadow: 0 2px 8px rgba(0,0,0,0.05);
        }

        .content {
            flex: 1;
            overflow-y: auto;
            padding: 16px;
        }

        /* Grid productos */
        .grid {
            display: grid;
            grid-template-columns: 1fr 1fr;
            gap: 16px;
        }

        .card-prod {
            background: var(--card-white);
            border-radius: 24px;
            padding: 14px;
            border: 1px solid var(--border-light);
            transition: 0.2s;
            box-shadow: var(--shadow-sm);
        }

        .img-prod {
            width: 100%;
            height: 120px;
            border-radius: 18px;
            object-fit: cover;
            background: #F2F2F5;
            margin-bottom: 12px;
        }

        .precio-original {
            text-decoration: line-through;
            font-size: 0.7rem;
            color: var(--text-secondary);
        }

        .precio-descuento {
            font-weight: 700;
            font-size: 1rem;
            color: var(--gold-dark);
        }

        .badge-stock {
            background: var(--silver-light);
            border-radius: 30px;
            padding: 3px 10px;
            font-size: 0.7rem;
            font-weight: 500;
            color: var(--text-primary);
        }

        .btn-add {
            background: linear-gradient(95deg, #F0F0F2, #E6E6EA);
            border: none;
            border-radius: 40px;
            padding: 8px;
            width: 100%;
            font-weight: 600;
            color: #2C2C2E;
            margin-top: 10px;
            transition: 0.2s;
            cursor: pointer;
        }

        .btn-add:active { background: var(--silver); color: white; }

        /* Carrito flotante degradado dorado-plata */
        .cart-float {
            position: fixed;
            bottom: 24px;
            right: 20px;
            background: linear-gradient(135deg, var(--gold), var(--silver));
            color: white;
            width: 58px;
            height: 58px;
            border-radius: 50%;
            display: flex;
            align-items: center;
            justify-content: center;
            box-shadow: 0 6px 16px rgba(0,0,0,0.1);
            z-index: 10000;
            cursor: pointer;
            font-size: 1.6rem;
        }

        .cart-count {
            position: absolute;
            top: -4px;
            right: -4px;
            background: var(--danger);
            color: white;
            font-size: 0.7rem;
            font-weight: bold;
            padding: 4px 8px;
            border-radius: 30px;
        }

        /* Modales */
        .modal-content {
            background: white;
            border-radius: 32px;
            padding: 24px;
            border: none;
            box-shadow: var(--shadow-md);
            max-width: 500px;
        }

        .ticket {
            background: #F9F9FB;
            border-radius: 20px;
            padding: 16px;
            border-left: 3px solid var(--gold);
            font-family: monospace;
        }

        .btn-ws {
            background: #25D366;
            border-radius: 44px;
            font-weight: 600;
            margin-top: 12px;
        }

        /* Admin panel con scroll */
        .admin-scroll-area {
            max-height: 260px;
            overflow-y: auto;
            margin-top: 16px;
            border-radius: 20px;
        }

        table {
            width: 100%;
            border-collapse: collapse;
            font-size: 0.8rem;
        }

        th {
            text-align: left;
            padding: 12px 8px;
            background: #F4F4F6;
            color: var(--gold-dark);
            font-weight: 600;
        }

        td {
            padding: 10px 8px;
            border-bottom: 1px solid var(--border-light);
        }

        .stats-card {
            background: #FCFCFD;
            border-radius: 24px;
            padding: 14px;
            text-align: center;
            border: 1px solid var(--border-light);
        }

        input, select {
            border-radius: 44px;
            border: 1px solid var(--border-light);
            padding: 12px 16px;
            background: white;
            width: 100%;
            margin-bottom: 12px;
            font-size: 0.9rem;
        }

        #toast {
            background: #1C1C1E;
            color: white;
            border-radius: 60px;
            padding: 10px 20px;
            font-size: 0.85rem;
        }

        button {
            cursor: pointer;
        }
    </style>
</head>
<body>

<div class="main-screen">
    <div class="card-inicio">
        <h1>DIANA PLATA</h1>
        <p>Studio · Elegancia en cada detalle</p>
        <button class="btn-entrar" onclick="abrirApp()">✦ Ingresar ✦</button>
    </div>
</div>

<div id="catalogo-overlay">
    <div class="header">
        <span id="logoAdmin">DIANA PLATA</span>
        <button onclick="cerrarApp()" style="background:#EBEBEF; border:none; padding:6px 16px; border-radius:40px; font-weight:500;">Cerrar</button>
    </div>
    <input type="text" id="searchInput" class="search-bar" placeholder="Buscar productos..." oninput="renderCatalogo()">

    <div class="tabs">
        <button class="tab" id="tabP" onclick="cambiarVista('prod')">Productos</button>
        <button class="tab" id="tabS" onclick="cambiarVista('serv')">Servicios</button>
    </div>

    <div class="content">
        <div id="prodView"><div id="catalogo-container"></div></div>
        <div id="servView" style="display:none;">
            <div class="card-prod" style="padding:24px; text-align:center;">
                <h3 style="color:var(--gold-dark);">📅 Agenda tu cita</h3>
                <select id="citaTipo" style="margin:16px 0;">
                    <option>Facial Rejuvenecedor</option>
                    <option>Masaje Corporal Esencial</option>
                    <option>Lifting de Cejas</option>
                    <option>Tratamiento Gold & Silver</option>
                </select>
                <input type="date" id="citaFecha">
                <button class="btn-ws" onclick="confirmarCita()">Confirmar vía WhatsApp</button>
            </div>
        </div>
    </div>

    <div class="cart-float" id="cartFloatBtn" onclick="abrirCarrito()">
        🛒 <span class="cart-count" id="cartCount">0</span>
    </div>
</div>

<!-- Modal Carrito -->
<div id="modalCarrito" class="modal">
    <div class="modal-content">
        <h3 style="color:var(--gold-dark);">Tu selección</h3>
        <div id="ticketArea" class="ticket"></div>
        <input type="text" id="custNombre" placeholder="Nombre completo">
        <input type="text" id="custDireccion" placeholder="Dirección (Celaya / zona)">
        <button class="btn-ws" onclick="enviarPedido()">Enviar pedido por WhatsApp</button>
        <button onclick="cerrarCarrito()" style="margin-top:12px; background:none; border:none; color:var(--text-secondary);">Seguir comprando</button>
    </div>
</div>

<!-- Panel Administrador (acceso por presión prolongada sobre logo) -->
<div id="adminPanel" class="modal">
    <div class="modal-content">
        <div style="display:flex; justify-content:space-between; align-items:center;">
            <h4 style="color:var(--gold-dark);">Panel de gestión</h4>
            <button onclick="cerrarAdmin()" style="background:none; border:none; font-size:1.6rem; cursor:pointer;">&times;</button>
        </div>
        <div style="display:grid; grid-template-columns:1fr 1fr; gap:12px; margin:16px 0;">
            <div class="stats-card"><span style="font-size:0.7rem;">📦 Stock total</span><br><b id="dashTotalStock" style="color:var(--gold);">0</b></div>
            <div class="stats-card"><span style="font-size:0.7rem;">🏷️ Dto. promedio</span><br><b id="dashAvgDescuento" style="color:var(--silver-dark);">0%</b></div>
        </div>
        <div id="formAdmin">
            <input type="hidden" id="editId">
            <input type="text" id="admNombre" placeholder="Nombre del producto">
            <input type="number" id="admPrecio" placeholder="Precio ($)">
            <select id="admMarca">
                <option>TERRAMAR</option><option>FARMASI</option><option>YANBAL</option><option>OTRO</option>
            </select>
            <div style="display:flex; gap:8px;">
                <input type="number" id="admStock" placeholder="Stock" value="5">
                <input type="number" id="admDescuento" placeholder="Descuento %" value="0" step="1">
            </div>
            <input type="file" id="admFile" accept="image/*">
            <button class="btn-add" id="btnGuardar" onclick="guardarProducto()">Guardar producto</button>
            <button id="btnCancelarEdit" onclick="limpiarForm()" style="display:none; margin-top:8px; background:#EBEBEF; border:none; border-radius:40px; padding:10px;">Cancelar edición</button>
        </div>
        <div class="admin-scroll-area">
            <table>
                <thead><tr><th>Producto</th><th>Precio</th><th>Stock</th><th>Dto%</th><th>Acciones</th></tr></thead>
                <tbody id="adminTableBody"></tbody>
            </table>
        </div>
    </div>
</div>

<div id="toast"></div>

<script type="module">

import { initializeApp } from "https://www.gstatic.com/firebasejs/10.12.2/firebase-app.js";
import { 
getFirestore, collection, addDoc, getDocs, deleteDoc, doc, updateDoc 
} from "https://www.gstatic.com/firebasejs/10.12.2/firebase-firestore.js";

// 🔥 CONFIG REAL
const firebaseConfig = { 
  apiKey: "AIzaSyCvrTlz7ewQlZBkTadgB9mxarMMJSvSp_A",
  authDomain: "dianapg-99037.firebaseapp.com",
  projectId: "dianapg-99037",
  storageBucket: "dianapg-99037.firebasestorage.app",
  messagingSenderId: "237058553544",
  appId: "1:237058553544:web:62caa7960d879394da57fd"
};

const app = initializeApp(firebaseConfig);
const db = getFirestore(app);

// ================= ESTADO =================
let productos = [];
let carrito = [];
let isAdmin = false;
let currentView = 'prod';

// ================= FIREBASE =================
async function cargarProductos(){
    const snap = await getDocs(collection(db,"productos"));
    productos = [];
    snap.forEach(d => productos.push({id:d.id, ...d.data()}));
    renderCatalogo();
    if(isAdmin) renderAdminTabla();
}

// ================= UTIL =================
function calcularPrecioFinal(precio, desc){
    return precio - (precio * (desc || 0) / 100);
}

// ================= RENDER =================
window.renderCatalogo = function(){
    const container = document.getElementById("catalogo-container");
    let data = [...productos];

    const q = document.getElementById("searchInput").value.toLowerCase();
    if(q) data = data.filter(p => p.nombre.toLowerCase().includes(q));

    const marcas = [...new Set(data.map(p=>p.marca))];
    container.innerHTML="";

    marcas.forEach(marca=>{
        const items = data.filter(p=>p.marca===marca);

        const section = document.createElement("div");
        section.innerHTML = `
        <div style="margin: 24px 0 12px 8px; font-weight:500; color:var(--gold-dark); border-left: 3px solid var(--silver); padding-left: 12px;">✦ ${marca} ✦</div>
        <div class="grid"></div>`;

        const grid = section.querySelector(".grid");

        items.forEach(p=>{
            const precioFinal = calcularPrecioFinal(p.precio, p.descuento);
            const card = document.createElement("div");
            card.className="card-prod";

            card.innerHTML = `
            <img src="${p.imagen || 'https://via.placeholder.com/120'}" class="img-prod">
            <div style="display:flex; justify-content:space-between;">
                <span class="badge-stock">📦 ${p.stock || 0}</span>
            </div>
            <p>${p.nombre}</p>
            <div>
                ${p.descuento>0?`<span class="precio-original">$${p.precio}</span>`:""}
                <span class="precio-descuento">$${Math.round(precioFinal)}</span>
            </div>`;

            const btn = document.createElement("button");
            btn.className="btn-add";
            btn.innerText = "Agregar";
            btn.onclick = ()=>agregarAlCarrito(p);

            card.appendChild(btn);
            grid.appendChild(card);
        });

        container.appendChild(section);
    });
}

// ================= ADMIN =================
window.renderAdminTabla = function(){
    const tbody = document.getElementById("adminTableBody");
    tbody.innerHTML="";

    productos.forEach(p=>{
        const row = tbody.insertRow();
        row.insertCell(0).innerText = p.nombre;
        row.insertCell(1).innerText = `$${p.precio}`;
        row.insertCell(2).innerText = p.stock || 0;
        row.insertCell(3).innerText = p.descuento || 0;

        const acc = row.insertCell(4);

        const edit = document.createElement("button");
        edit.innerText="✏️";
        edit.onclick=()=>editarProducto(p);

        const del = document.createElement("button");
        del.innerText="🗑️";
        del.onclick=()=>eliminarProducto(p.id);

        acc.appendChild(edit);
        acc.appendChild(del);
    });
}

window.guardarProducto = async function(){
    const id = document.getElementById("editId").value;
    const nombre = admNombre.value;
    const precio = +admPrecio.value;
    const marca = admMarca.value;
    const stock = +admStock.value;
    const descuento = +admDescuento.value;

    if(!nombre || !precio) return alert("Datos inválidos");

    if(id){
        await updateDoc(doc(db,"productos",id),{
            nombre,precio,marca,stock,descuento
        });
    }else{
        await addDoc(collection(db,"productos"),{
            nombre,precio,marca,stock,descuento,imagen:""
        });
    }

    limpiarForm();
    cargarProductos();
}

window.eliminarProducto = async function(id){
    await deleteDoc(doc(db,"productos",id));
    cargarProductos();
}

window.editarProducto = function(p){
    editId.value = p.id;
    admNombre.value = p.nombre;
    admPrecio.value = p.precio;
    admMarca.value = p.marca;
    admStock.value = p.stock;
    admDescuento.value = p.descuento;
}

// ================= CARRITO =================
window.agregarAlCarrito = function(p){
    const precioFinal = calcularPrecioFinal(p.precio, p.descuento);
    carrito.push({...p, precioFinal});
    actualizarContador();
}

function actualizarContador(){
    cartCount.innerText = carrito.length;
}

window.abrirCarrito = function(){
    let total=0, html="";
    carrito.forEach(p=>{
        html+=`${p.nombre} $${p.precioFinal}<br>`;
        total+=p.precioFinal;
    });
    html+=`<br>Total: $${total}`;
    ticketArea.innerHTML=html;
    modalCarrito.style.display="flex";
}

window.cerrarCarrito = ()=>modalCarrito.style.display="none";

// ================= PEDIDOS =================
window.enviarPedido = async function(){
    const nombre = custNombre.value;
    const direccion = custDireccion.value;

    await addDoc(collection(db,"pedidos"),{
        nombre,direccion,carrito,fecha:new Date()
    });

    alert("Pedido guardado");
    carrito=[];
    actualizarContador();
    cerrarCarrito();
}

// ================= INIT =================
window.onload = ()=>{
    cargarProductos();
}

// ================= PWA =================
if("serviceWorker" in navigator){
    navigator.serviceWorker.register("sw.js");
}

</script>
</body>
</html>
