<!DOCTYPE html>
<html lang="es">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0, maximum-scale=1.0, user-scalable=no, viewport-fit=cover">
    <title>DIANA PLATA | Beauty Studio</title>
    <link rel="manifest" href="manifest.json">
    <meta name="theme-color" content="#fdf2f8">
    <style>
        * {
            margin: 0;
            padding: 0;
            box-sizing: border-box;
            -webkit-tap-highlight-color: transparent;
        }

        :root {
            --rose-light: #fff5f8;
            --rose-bg: #fdf2f8;
            --rose-card: #ffffff;
            --rose-primary: #f9a8d4;
            --rose-deep: #f472b6;
            --gold: #d4af37;
            --gold-light: #f3e5ab;
            --gold-dark: #b8860b;
            --text-dark: #2d2a2e;
            --text-muted: #7e6b73;
            --border-rose: #fce7f3;
            --success: #2b7a4b;
            --danger: #e11d48;
            --shadow-sm: 0 8px 20px rgba(0,0,0,0.05);
            --shadow-md: 0 12px 28px rgba(0,0,0,0.08);
            --shadow-gold: 0 4px 14px rgba(212, 175, 55, 0.2);
        }

        html, body {
            height: 100%;
            font-family: 'Poppins', 'Segoe UI', system-ui, -apple-system, 'Inter', sans-serif;
            background: var(--rose-bg);
            color: var(--text-dark);
            overflow: hidden;
        }

        /* GRADIENTE ELEGANTE PARA PANTALLA DE INICIO */
        @keyframes shimmer {
            0% { background-position: 0% 50%; }
            50% { background-position: 100% 50%; }
            100% { background-position: 0% 50%; }
        }

        .main-screen {
            height: 100dvh;
            display: flex;
            align-items: center;
            justify-content: center;
            padding: 24px;
            background: linear-gradient(135deg, #ffe6f0, #ffd9e8, #fbcfe8, #fdf2f8);
            background-size: 300% 300%;
            animation: shimmer 12s ease infinite;
            position: relative;
        }

        .main-screen::before {
            content: "✨";
            position: absolute;
            font-size: 120px;
            opacity: 0.1;
            bottom: 20px;
            right: 20px;
            pointer-events: none;
        }

        .card-inicio {
            background: rgba(255, 248, 251, 0.85);
            backdrop-filter: blur(18px);
            border-radius: 48px;
            padding: 48px 28px;
            text-align: center;
            width: 100%;
            max-width: 380px;
            border: 1px solid rgba(255, 215, 200, 0.5);
            box-shadow: var(--shadow-md);
        }

        .card-inicio h1 {
            font-size: 2rem;
            font-weight: 600;
            letter-spacing: -0.5px;
            background: linear-gradient(135deg, #c084fc, #f472b6, #d4af37);
            -webkit-background-clip: text;
            background-clip: text;
            color: transparent;
            margin-bottom: 8px;
        }

        .card-inicio p {
            color: #9d8189;
            font-weight: 400;
        }

        .btn-entrar {
            background: linear-gradient(90deg, #f9a8d4, #f472b6);
            border: none;
            padding: 14px 28px;
            border-radius: 60px;
            font-weight: 600;
            font-size: 1rem;
            color: white;
            width: 100%;
            margin-top: 28px;
            cursor: pointer;
            box-shadow: var(--shadow-gold);
            transition: 0.2s;
        }

        .btn-entrar:active { transform: scale(0.97); }

        /* CATÁLOGO OVERLAY */
        #catalogo-overlay {
            position: fixed;
            inset: 0;
            background: var(--rose-bg);
            z-index: 9999;
            transform: translateY(100%);
            transition: 0.4s cubic-bezier(0.2, 0.9, 0.4, 1.1);
            display: flex;
            flex-direction: column;
        }

        #catalogo-overlay.active {
            transform: translateY(0);
        }

        /* HEADER ROSA/DORADO */
        .header {
            padding: 18px 20px;
            background: white;
            border-bottom: 1px solid var(--border-rose);
            display: flex;
            justify-content: space-between;
            align-items: center;
            box-shadow: 0 2px 8px rgba(0,0,0,0.02);
        }

        #logoAdmin {
            font-weight: 700;
            font-size: 1.4rem;
            background: linear-gradient(135deg, #c084fc, #f472b6);
            -webkit-background-clip: text;
            background-clip: text;
            color: transparent;
            letter-spacing: -0.3px;
            cursor: pointer;
        }

        .search-bar {
            background: #ffffff;
            border: 1px solid var(--border-rose);
            border-radius: 40px;
            padding: 12px 18px;
            margin: 12px 16px;
            font-size: 0.9rem;
            box-shadow: var(--shadow-sm);
        }

        /* TABS */
        .tabs {
            display: flex;
            gap: 12px;
            padding: 8px 16px;
            background: white;
            margin: 0 12px 12px 12px;
            border-radius: 60px;
            box-shadow: var(--shadow-sm);
        }

        .tab {
            flex: 1;
            background: transparent;
            border: none;
            padding: 10px 0;
            border-radius: 40px;
            font-weight: 600;
            color: var(--text-muted);
            transition: 0.2s;
            cursor: pointer;
        }

        .tab.active {
            background: var(--rose-primary);
            color: white;
            box-shadow: 0 2px 8px rgba(249, 168, 212, 0.3);
        }

        .content {
            flex: 1;
            overflow-y: auto;
            padding: 12px 16px;
        }

        /* TARJETAS PRODUCTOS */
        .grid {
            display: grid;
            grid-template-columns: 1fr 1fr;
            gap: 16px;
        }

        .card-prod {
            background: var(--rose-card);
            border-radius: 28px;
            padding: 14px;
            border: 1px solid var(--border-rose);
            transition: 0.2s;
            box-shadow: var(--shadow-sm);
        }

        .img-prod {
            width: 100%;
            height: 120px;
            border-radius: 20px;
            object-fit: cover;
            background: #fce7f3;
            margin-bottom: 12px;
        }

        .precio-original {
            text-decoration: line-through;
            font-size: 0.7rem;
            color: #a8768a;
        }

        .precio-descuento {
            font-weight: 800;
            font-size: 1rem;
            color: var(--gold-dark);
        }

        .badge-stock {
            background: #f3e8ff;
            border-radius: 20px;
            padding: 3px 10px;
            font-size: 0.7rem;
            font-weight: 500;
            color: #b4537a;
        }

        .btn-add {
            background: linear-gradient(95deg, #f9a8d4, #fbcfe8);
            border: none;
            border-radius: 50px;
            padding: 8px;
            width: 100%;
            font-weight: 600;
            color: #4a2c38;
            margin-top: 10px;
            transition: 0.2s;
            cursor: pointer;
        }

        /* CARRITO FLOTANTE */
        .cart-float {
            position: fixed;
            bottom: 25px;
            right: 20px;
            background: var(--gold);
            color: #2d2a2e;
            width: 60px;
            height: 60px;
            border-radius: 50%;
            display: flex;
            align-items: center;
            justify-content: center;
            box-shadow: 0 8px 20px rgba(212, 175, 55, 0.4);
            z-index: 10000;
            cursor: pointer;
            font-size: 1.8rem;
        }

        .cart-count {
            position: absolute;
            top: -5px;
            right: -5px;
            background: var(--danger);
            color: white;
            font-size: 0.7rem;
            padding: 4px 8px;
            border-radius: 30px;
            font-weight: bold;
        }

        /* MODALES ESTILO BEAUTY */
        .modal-content {
            background: white;
            border-radius: 40px;
            padding: 28px;
            border: 1px solid #fce7f3;
            box-shadow: var(--shadow-md);
        }

        .ticket {
            background: #fffafc;
            border-radius: 24px;
            border-left: 4px solid var(--gold);
        }

        .btn-ws {
            background: #25D366;
            border-radius: 40px;
            font-weight: 600;
            margin-top: 10px;
        }

        /* TABLA ADMIN SCROLL */
        .admin-scroll-area {
            max-height: 260px;
            overflow-y: auto;
            border-radius: 24px;
            background: #fffafd;
        }

        table {
            width: 100%;
            border-collapse: collapse;
        }

        th {
            background: #fef2f6;
            color: #b4537a;
            font-weight: 600;
            padding: 12px;
        }

        td {
            padding: 10px 8px;
            border-bottom: 1px solid #fce7f3;
        }

        .stats-card {
            background: linear-gradient(145deg, #fff5f8, #ffffff);
            border-radius: 28px;
            padding: 12px;
            text-align: center;
            box-shadow: var(--shadow-sm);
        }

        input, select {
            border-radius: 60px;
            border: 1px solid #fbcfe8;
            padding: 12px 16px;
            background: white;
        }

        #toast {
            background: #2d2a2e;
            color: #fdf2f8;
            border-radius: 60px;
            backdrop-filter: blur(8px);
        }
    </style>
</head>
<body>

<div class="main-screen">
    <div class="card-inicio">
        <h1>🌸 DIANA PLATA</h1>
        <p>Beauty Studio · Elegancia & Bienestar</p>
        <button class="btn-entrar" onclick="abrirApp()">✦ Ver Colección ✦</button>
    </div>
</div>

<div id="catalogo-overlay">
    <div class="header">
        <span id="logoAdmin">💖 DIANA PLATA</span>
        <button onclick="cerrarApp()" style="background:#fce7f3; border:none; padding:6px 16px; border-radius:40px; font-weight:500;">Cerrar</button>
    </div>
    <input type="text" id="searchInput" class="search-bar" placeholder="🔍 Buscar tratamientos o productos..." oninput="renderCatalogo()">

    <div class="tabs">
        <button class="tab" id="tabP" onclick="cambiarVista('prod')">✨ Productos</button>
        <button class="tab" id="tabS" onclick="cambiarVista('serv')">💆‍♀️ Servicios</button>
    </div>

    <div class="content">
        <div id="prodView"><div id="catalogo-container"></div></div>
        <div id="servView" style="display:none;">
            <div class="card-prod" style="padding:24px; text-align:center;">
                <h3 style="color:#b4537a;">📅 Reserva tu momento</h3>
                <select id="citaTipo" style="margin:15px 0;">
                    <option>Facial Glow Diamond</option>
                    <option>Masaje Corporal con Aceites</option>
                    <option>Diseño de Cejas & Lifting</option>
                    <option>Tratamiento Gold Relax</option>
                </select>
                <input type="date" id="citaFecha">
                <button class="btn-ws" onclick="confirmarCita()">Confirmar vía WhatsApp</button>
            </div>
        </div>
    </div>

    <div class="cart-float" id="cartFloatBtn" onclick="abrirCarrito()">
        🛍️ <span class="cart-count" id="cartCount">0</span>
    </div>
</div>

<!-- Modal Carrito -->
<div id="modalCarrito" class="modal">
    <div class="modal-content">
        <h3 style="color:#d4af37;">🛒 Tu pedido especial</h3>
        <div id="ticketArea" class="ticket" style="background:#fff9fb;"></div>
        <input type="text" id="custNombre" placeholder="Tu nombre ✨">
        <input type="text" id="custDireccion" placeholder="Dirección (Celaya / zona)">
        <button class="btn-ws" onclick="enviarPedido()">💎 Enviar pedido por WhatsApp</button>
        <button onclick="cerrarCarrito()" style="margin-top:12px; background:none; border:none; color:#a8768a;">Seguir comprando</button>
    </div>
</div>

<!-- Panel Admin (Rosa/Dorado) -->
<div id="adminPanel" class="modal">
    <div class="modal-content">
        <div style="display:flex; justify-content:space-between;">
            <h4 style="color:#b4537a;">👑 Administración Studio</h4>
            <button onclick="cerrarAdmin()" style="background:none; border:none; font-size:1.8rem;">&times;</button>
        </div>
        <div style="display:grid; grid-template-columns:1fr 1fr; gap:12px; margin:15px 0;">
            <div class="stats-card"><p style="font-size:0.7rem;">📦 Stock Total</p><b id="dashTotalStock" style="color:#d4af37;">0</b></div>
            <div class="stats-card"><p style="font-size:0.7rem;">🏷️ Descuento Promedio</p><b id="dashAvgDescuento" style="color:#f472b6;">0%</b></div>
        </div>
        <div id="formAdmin">
            <input type="hidden" id="editId">
            <input type="text" id="admNombre" placeholder="Nombre del producto">
            <input type="number" id="admPrecio" placeholder="Precio base ($)">
            <select id="admMarca">
                <option>TERRAMAR</option><option>FARMASI</option><option>YANBAL</option><option>OTRO</option>
            </select>
            <div style="display:flex; gap:8px;">
                <input type="number" id="admStock" placeholder="Stock" value="5">
                <input type="number" id="admDescuento" placeholder="Descuento %" value="0" step="1">
            </div>
            <input type="file" id="admFile" accept="image/*">
            <button class="btn-add" id="btnGuardar" onclick="guardarProducto()">✨ Guardar Producto</button>
            <button id="btnCancelarEdit" onclick="limpiarForm()" style="display:none; background:#fce7f3; border-radius:40px; padding:10px;">Cancelar edición</button>
        </div>
        <div class="admin-scroll-area">
            <table><thead><tr><th>Producto</th><th>Precio</th><th>Stock</th><th>Dto%</th><th>Acciones</th></tr></thead><tbody id="adminTableBody"></tbody></table>
        </div>
    </div>
</div>

<div id="toast"></div>

<script>
    const CONFIG = {
        phone: "527121919227",
        secretCode: "DAYANA123456",
        tienda: "DIANA PLATA ✨ Beauty Studio"
    };

    let carrito = [];
    let isAdmin = false;
    let vistaActual = 'prod';

    // ---- STORAGE ----
    function getProductos() {
        const data = localStorage.getItem("diana_beauty_v4");
        if (!data) {
            const demo = [
                { id: 201, nombre: "Rosa Hydra Cream", precio: 390, marca: "TERRAMAR", imagen: "", stock: 12, descuento: 10 },
                { id: 202, nombre: "Gold Serum Lifting", precio: 580, marca: "FARMASI", imagen: "", stock: 5, descuento: 15 },
                { id: 203, nombre: "Exfoliante de Diamante", precio: 340, marca: "YANBAL", imagen: "", stock: 8, descuento: 0 },
                { id: 204, nombre: "Brillo Labial Perla", precio: 180, marca: "OTRO", imagen: "", stock: 3, descuento: 20 }
            ];
            localStorage.setItem("diana_beauty_v4", JSON.stringify(demo));
            return demo;
        }
        return JSON.parse(data);
    }

    function setProductos(arr) {
        localStorage.setItem("diana_beauty_v4", JSON.stringify(arr));
    }

    function calcularPrecioFinal(precio, desc) {
        return precio - (precio * (desc || 0) / 100);
    }

    function renderCatalogo() {
        const container = document.getElementById("catalogo-container");
        if (!container) return;
        let productos = getProductos();
        const query = document.getElementById("searchInput").value.toLowerCase();
        if (query) productos = productos.filter(p => p.nombre.toLowerCase().includes(query));
        
        const marcasUnicas = [...new Set(productos.map(p => p.marca))];
        container.innerHTML = "";
        for (let marca of marcasUnicas) {
            const items = productos.filter(p => p.marca === marca);
            if (items.length === 0) continue;
            const section = document.createElement("div");
            section.innerHTML = `<h5 style="margin:25px 0 12px 8px; color:#d4af37; font-weight:600; letter-spacing:1px;">✦ ${marca} ✦</h5><div class="grid"></div>`;
            const grid = section.querySelector(".grid");
            items.forEach(prod => {
                const precioFinal = calcularPrecioFinal(prod.precio, prod.descuento);
                const tieneStock = (prod.stock || 0) > 0;
                const card = document.createElement("div");
                card.className = "card-prod";
                if (!tieneStock) card.style.opacity = "0.6";
                card.innerHTML = `
                    <img src="${prod.imagen || 'https://via.placeholder.com/120?text=✨'}" class="img-prod" onerror="this.src='https://via.placeholder.com/120?text=Beauty'">
                    <div style="display:flex; justify-content:space-between;"><span class="badge-stock">📦 ${prod.stock ?? 0} uds</span>${!tieneStock ? '<span style="color:#e11d48;">Agotado</span>' : ''}</div>
                    <p style="font-weight:600; margin:8px 0;">${prod.nombre}</p>
                    <div>${prod.descuento > 0 ? `<span class="precio-original">$${prod.precio}</span> ` : ''}<span class="precio-descuento">$${Math.round(precioFinal)}</span> ${prod.descuento > 0 ? `<span style="font-size:0.7rem;">-${prod.descuento}%</span>` : ''}</div>
                `;
                const btn = document.createElement("button");
                btn.innerText = tieneStock ? "➕ Agregar al neceser" : "Sin stock";
                btn.className = "btn-add";
                if (tieneStock) btn.onclick = () => agregarAlCarrito(prod);
                else btn.disabled = true;
                card.appendChild(btn);
                grid.appendChild(card);
            });
            container.appendChild(section);
        }
    }

    function renderAdminTabla() {
        const tbody = document.getElementById("adminTableBody");
        if (!tbody) return;
        const prods = getProductos();
        tbody.innerHTML = "";
        let totalStock = 0, sumaDto = 0, countDto = 0;
        prods.forEach(p => {
            totalStock += (p.stock || 0);
            if (p.descuento > 0) { sumaDto += p.descuento; countDto++; }
            const row = tbody.insertRow();
            row.insertCell(0).innerText = p.nombre.length > 15 ? p.nombre.slice(0,12)+".." : p.nombre;
            row.insertCell(1).innerHTML = `$${p.precio}`;
            row.insertCell(2).innerHTML = `<span style="background:#fce7f3; padding:2px 12px; border-radius:20px;">${p.stock ?? 0}</span>`;
            row.insertCell(3).innerText = `${p.descuento || 0}%`;
            const acc = row.insertCell(4);
            const editBtn = document.createElement("button"); editBtn.innerText = "✏️"; editBtn.className = "btn-icon"; editBtn.style.background="none"; editBtn.onclick = () => editarProducto(p.id);
            const delBtn = document.createElement("button"); delBtn.innerText = "🗑️"; delBtn.className = "btn-icon"; delBtn.style.color="#e11d48"; delBtn.onclick = () => eliminarProducto(p.id);
            acc.appendChild(editBtn); acc.appendChild(delBtn);
        });
        document.getElementById("dashTotalStock").innerText = totalStock;
        const promedioDto = countDto ? Math.round(sumaDto / countDto) : 0;
        document.getElementById("dashAvgDescuento").innerText = `${promedioDto}%`;
    }

    function guardarProducto() {
        const id = document.getElementById("editId").value;
        const nombre = document.getElementById("admNombre").value.trim();
        const precio = parseFloat(document.getElementById("admPrecio").value);
        const marca = document.getElementById("admMarca").value;
        const stock = parseInt(document.getElementById("admStock").value) || 0;
        let descuento = parseInt(document.getElementById("admDescuento").value) || 0;
        if (descuento > 100) descuento = 100;
        const file = document.getElementById("admFile").files[0];
        if (!nombre || isNaN(precio)) return toast("❌ Completa nombre y precio");
        
        const procesarImagen = (base64) => {
            let productos = getProductos();
            if (id) {
                const idx = productos.findIndex(p => p.id == id);
                if (idx !== -1) {
                    productos[idx] = { ...productos[idx], nombre, precio, marca, stock, descuento, imagen: base64 !== undefined ? base64 : productos[idx].imagen };
                }
            } else {
                productos.push({ id: Date.now(), nombre, precio, marca, stock, descuento, imagen: base64 || "" });
            }
            setProductos(productos);
            limpiarForm();
            renderCatalogo();
            if (isAdmin) renderAdminTabla();
            toast(id ? "✅ Producto actualizado" : "✨ Nuevo producto agregado");
        };
        if (file) {
            const reader = new FileReader();
            reader.onload = e => procesarImagen(e.target.result);
            reader.readAsDataURL(file);
        } else procesarImagen(undefined);
    }

    function editarProducto(id) {
        const prod = getProductos().find(p => p.id == id);
        if (!prod) return;
        document.getElementById("editId").value = prod.id;
        document.getElementById("admNombre").value = prod.nombre;
        document.getElementById("admPrecio").value = prod.precio;
        document.getElementById("admMarca").value = prod.marca;
        document.getElementById("admStock").value = prod.stock ?? 0;
        document.getElementById("admDescuento").value = prod.descuento ?? 0;
        document.getElementById("btnGuardar").innerText = "💾 Actualizar Producto";
        document.getElementById("btnCancelarEdit").style.display = "block";
        document.getElementById("formAdmin").scrollIntoView({ behavior: "smooth" });
    }

    function limpiarForm() {
        document.getElementById("editId").value = "";
        document.getElementById("admNombre").value = "";
        document.getElementById("admPrecio").value = "";
        document.getElementById("admStock").value = "5";
        document.getElementById("admDescuento").value = "0";
        document.getElementById("admFile").value = "";
        document.getElementById("btnGuardar").innerText = "✨ Guardar Producto";
        document.getElementById("btnCancelarEdit").style.display = "none";
    }

    function eliminarProducto(id) {
        if (confirm("¿Eliminar este producto del catálogo?")) {
            const nuevos = getProductos().filter(p => p.id != id);
            setProductos(nuevos);
            renderCatalogo();
            if (isAdmin) renderAdminTabla();
            toast("🗑️ Eliminado");
        }
    }

    // Carrito
    function agregarAlCarrito(prod) {
        const precioFinal = calcularPrecioFinal(prod.precio, prod.descuento);
        carrito.push({ id: prod.id, nombre: prod.nombre, precioFinal, descuento: prod.descuento });
        actualizarContador();
        toast(`🌸 ${prod.nombre} añadido`);
    }

    function actualizarContador() {
        document.getElementById("cartCount").innerText = carrito.length;
    }

    function dibujarTicket() {
        let total = 0;
        let html = `<div style="font-family:monospace;">${CONFIG.tienda}<br>━━━━━━━━━━━━<br>`;
        carrito.forEach(item => {
            html += `• ${item.nombre}  $${item.precioFinal}<br>`;
            total += item.precioFinal;
        });
        html += `━━━━━━━━━━━━<br>💎 TOTAL: $${total}<br>✨ Gracias por tu confianza</div>`;
        document.getElementById("ticketArea").innerHTML = html;
    }

    function abrirCarrito() {
        if (carrito.length === 0) return toast("🛍️ Tu neceser está vacío");
        dibujarTicket();
        document.getElementById("modalCarrito").style.display = "flex";
    }
    function cerrarCarrito() { document.getElementById("modalCarrito").style.display = "none"; }

    function enviarPedido() {
        const nombre = document.getElementById("custNombre").value.trim();
        const direccion = document.getElementById("custDireccion").value.trim();
        if (!nombre || !direccion) return toast("Por favor completa tus datos");
        let total = 0, mensaje = `✨ *${CONFIG.tienda}* ✨%0A👑 Pedido para: ${nombre}%0A📍 ${direccion}%0A━━━━━━━━━━%0A`;
        carrito.forEach(p => { mensaje += `🌸 ${p.nombre} : $${p.precioFinal}%0A`; total += p.precioFinal; });
        mensaje += `━━━━━━━━━━%0A💎 *TOTAL: $${total}*%0A¡Gracias por elegir Diana Plata! 💖`;
        window.open(`https://wa.me/${CONFIG.phone}?text=${encodeURIComponent(mensaje)}`);
        carrito = [];
        actualizarContador();
        cerrarCarrito();
        toast("💕 Pedido enviado");
    }

    function confirmarCita() {
        const fecha = document.getElementById("citaFecha").value;
        if (!fecha) return toast("Selecciona una fecha");
        const servicio = document.getElementById("citaTipo").value;
        const msg = `Hola ✨ DIANA PLATA ✨, deseo agendar *${servicio}* para el día ${fecha}. 💆‍♀️`;
        window.open(`https://wa.me/${CONFIG.phone}?text=${encodeURIComponent(msg)}`);
    }

    // UI & Admin
    function cambiarVista(vista) {
        vistaActual = vista;
        document.getElementById("prodView").style.display = vista === "prod" ? "block" : "none";
        document.getElementById("servView").style.display = vista === "serv" ? "block" : "none";
        document.getElementById("cartFloatBtn").style.display = vista === "prod" ? "flex" : "none";
        document.querySelectorAll(".tab").forEach(t => t.classList.remove("active"));
        document.getElementById(vista === "prod" ? "tabP" : "tabS").classList.add("active");
        if (vista === "prod") renderCatalogo();
    }

    function abrirApp() {
        document.getElementById("catalogo-overlay").classList.add("active");
        cambiarVista('prod');
    }
    function cerrarApp() {
        document.getElementById("catalogo-overlay").classList.remove("active");
    }

    let timer;
    document.getElementById("logoAdmin").addEventListener("mousedown", () => {
        timer = setTimeout(() => {
            const code = prompt("🔑 Código de administradora:");
            if (code === CONFIG.secretCode) {
                isAdmin = true;
                renderAdminTabla();
                document.getElementById("adminPanel").style.display = "flex";
                limpiarForm();
            } else if (code) toast("Código incorrecto");
        }, 800);
    });
    document.getElementById("logoAdmin").addEventListener("mouseup", () => clearTimeout(timer));
    document.getElementById("logoAdmin").addEventListener("touchend", () => clearTimeout(timer));

    function cerrarAdmin() { isAdmin = false; document.getElementById("adminPanel").style.display = "none"; renderCatalogo(); }
    function toast(msg) { const t = document.getElementById("toast"); t.innerText = msg; t.style.opacity = "1"; setTimeout(() => t.style.opacity = "0", 2200); }

    window.onload = () => {
        renderCatalogo();
        actualizarContador();
        document.getElementById("citaFecha").value = new Date().toISOString().slice(0,10);
    };
</script>
</body>
</html>
