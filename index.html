<!DOCTYPE html>
<html lang="es">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Dashboard | E_M_P_G</title>
    <style>
        /* Reset y Estilo Base */
        body { 
            margin: 0; height: 100vh; display: flex; justify-content: center; 
            align-items: center; font-family: sans-serif; background: #f1f5f9; 
        }

        /* Botón estilo 'Catálogo Emergente' */
        .btn-trigger {
            background: #ffffff;
            padding: 40px;
            border-radius: 30px;
            box-shadow: 0 10px 30px rgba(0,0,0,0.05);
            text-align: center;
            max-width: 350px;
        }

        .main-button {
            background: #0f172a;
            color: white;
            padding: 18px 30px;
            border-radius: 50px;
            border: none;
            font-size: 1.1rem;
            cursor: pointer;
            display: flex; align-items: center; gap: 10px;
            width: 100%; justify-content: center;
        }

        /* Ventana Emergente (Modal) */
        .modal-overlay {
            display: none; 
            position: fixed; top: 0; left: 0; width: 100%; height: 100%;
            background: rgba(0,0,0,0.6); backdrop-filter: blur(4px);
            z-index: 999; justify-content: center; align-items: center;
        }

        .modal-content {
            width: 90%; max-width: 800px; height: 70vh;
            background: white; border-radius: 20px;
            position: relative; overflow: hidden;
            animation: apper 0.3s ease-out;
        }

        @keyframes apper {
            from { transform: scale(0.9); opacity: 0; }
            to { transform: scale(1); opacity: 1; }
        }

        .close-btn {
            position: absolute; top: 15px; right: 20px;
            font-size: 24px; cursor: pointer; color: #64748b;
        }

        iframe { width: 100%; height: 100%; border: none; }
    </style>
</head>
<body>

    <div class="btn-trigger">
        <h2 style="color: #1e293b;">Catálogo Digital</h2>
        <p style="color: #64748b;">Haz clic para ver nuestros productos sin salir de esta página.</p>
        <button class="main-button" onclick="openModal()">
            🛍️ Ver catálogo emergente
        </button>
    </div>

    <div class="modal-overlay" id="modal">
        <div class="modal-content">
            <span class="close-btn" onclick="closeModal()">&times;</span>
            <iframe src="catalogo.html"></iframe>
        </div>
    </div>

    <script>
        const modal = document.getElementById('modal');
        function openModal() { modal.style.display = 'flex'; }
        function closeModal() { modal.style.display = 'none'; }
        
        // Cerrar al hacer clic fuera del cuadro blanco
        window.onclick = (e) => { if(e.target == modal) closeModal(); }
    </script>
</body>
</html>
