<!DOCTYPE html>
<html lang="es">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0, viewport-fit=cover">
<title>DIANA PLATA | Beauty Studio</title>

<link rel="manifest" href="manifest.json">
<meta name="theme-color" content="#FFFFFF">

<style>
:root{--bg:#F8F9FC;--gold:#C5A059;--dark:#1E1E2F;}
body{margin:0;font-family:sans-serif;background:var(--bg);color:var(--dark);}
.modal{position:fixed;inset:0;background:rgba(0,0,0,.4);display:none;align-items:center;justify-content:center;z-index:9999;}
.card{background:white;padding:12px;border-radius:16px;box-shadow:0 4px 12px rgba(0,0,0,.05);}
.grid{display:grid;grid-template-columns:1fr 1fr;gap:12px;padding:12px;}
.btn{border:none;border-radius:30px;padding:10px;cursor:pointer;}
.gold{background:var(--gold);color:white;}
#catalogo-overlay{position:fixed;inset:0;background:white;transform:translateY(100%);transition:.3s;display:flex;flex-direction:column;}
#catalogo-overlay.active{transform:translateY(0);}
.cart-float{position:fixed;bottom:20px;right:20px;background:var(--gold);width:60px;height:60px;border-radius:50%;display:flex;align-items:center;justify-content:center;color:white;cursor:pointer;}
.cart-count{position:absolute;top:-5px;right:-5px;background:red;color:white;border-radius:50%;font-size:10px;padding:4px;}
</style>
</head>

<body>

<div style="height:100vh;display:flex;align-items:center;justify-content:center;">
<button class="btn gold" onclick="abrirApp()">Entrar</button>
</div>

<div id="catalogo-overlay">
<div style="display:flex;justify-content:space-between;padding:10px;">
<b id="logoAdmin">DIANA PLATA</b>
<button onclick="cerrarApp()">Cerrar</button>
</div>

<input id="searchInput" placeholder="Buscar..." oninput="renderCatalogo()">

<div id="catalogo-container" class="grid"></div>

<div class="cart-float" onclick="abrirCarrito()">
🛒 <span id="cartCount" class="cart-count">0</span>
</div>
</div>

<!-- carrito -->
<div id="modalCarrito" class="modal">
<div class="card">
<div id="ticket"></div>
<input id="custNombre" placeholder="Nombre">
<input id="custDireccion" placeholder="Dirección">
<button onclick="enviarPedido()">Enviar pedido</button>
<button onclick="cerrarCarrito()">Cerrar</button>
</div>
</div>

<!-- admin -->
<div id="adminPanel" class="modal">
<div class="card">
<h3>Panel Admin</h3>

<input id="admNombre" placeholder="Nombre">
<input id="admPrecio" type="number" placeholder="Precio">
<input id="admStock" type="number" placeholder="Stock">
<button onclick="guardarProducto()">Guardar</button>

<table id="adminTable"></table>

<button onclick="cerrarAdmin()">Cerrar</button>
</div>
</div>

<script type="module">

// 🔥 FIREBASE IMPORTS
import { initializeApp } from "https://www.gstatic.com/firebasejs/10.12.2/firebase-app.js";
import { getFirestore, collection, addDoc, getDocs } from "https://www.gstatic.com/firebasejs/10.12.2/firebase-firestore.js";

// 🔥 TU CONFIG (YA INTEGRADA)
const firebaseConfig = { 
  apiKey: "AIzaSyCvrTlz7ewQlZBkTadgB9mxarMMJSvSp_A",
  authDomain: "dianapg-99037.firebaseapp.com",
  projectId: "dianapg-99037",
  storageBucket: "dianapg-99037.firebasestorage.app",
  messagingSenderId: "237058553544",
  appId: "1:237058553544:web:62caa7960d879394da57fd",
  measurementId: "G-8535MPT6RV"
};

// 🔥 INIT FIREBASE
const app = initializeApp(firebaseConfig);
const db = getFirestore(app);

// ================= ESTADO =================
let carrito = [];
let productos = [];

// ================= CARGAR PRODUCTOS =================
async function cargarProductos(){
  const querySnapshot = await getDocs(collection(db, "productos"));
  productos = [];
  querySnapshot.forEach(doc => {
    productos.push({ id: doc.id, ...doc.data() });
  });
  renderCatalogo();
}

// ================= RENDER =================
function renderCatalogo(){
  let q = document.getElementById("searchInput").value.toLowerCase();
  let data = productos.filter(p => p.nombre.toLowerCase().includes(q));

  let html="";
  data.forEach(p=>{
    html+=`
    <div class="card">
      <b>${p.nombre}</b><br>
      $${p.precio}<br>
      Stock:${p.stock}<br>
      <button onclick="addToCart('${p.id}')">Agregar</button>
    </div>`;
  });
  document.getElementById("catalogo-container").innerHTML=html;
}

// ================= CARRITO =================
window.addToCart = function(id){
  let p = productos.find(x=>x.id===id);
  if(!p || p.stock<=0) return alert("Sin stock");

  carrito.push(p);
  localStorage.setItem("carrito",JSON.stringify(carrito));
  actualizarContador();
}

function actualizarContador(){
  document.getElementById("cartCount").innerText = carrito.length;
}

function abrirCarrito(){
  let html="";
  carrito.forEach(p=>html+=`${p.nombre} $${p.precio}<br>`);
  document.getElementById("ticket").innerHTML=html;
  document.getElementById("modalCarrito").style.display="flex";
}

function cerrarCarrito(){
  document.getElementById("modalCarrito").style.display="none";
}

// ================= PEDIDOS =================
window.enviarPedido = async function(){
  let nombre = document.getElementById("custNombre").value;
  let dir = document.getElementById("custDireccion").value;

  if(!nombre || !dir) return alert("Completa datos");

  let total = carrito.reduce((a,b)=>a+b.precio,0);

  await addDoc(collection(db, "pedidos"), {
    nombre,
    direccion: dir,
    carrito,
    total,
    fecha: new Date()
  });

  alert("Pedido guardado");

  carrito=[];
  localStorage.setItem("carrito","[]");
  actualizarContador();
  cerrarCarrito();
}

// ================= ADMIN =================
document.getElementById("logoAdmin").ondblclick=()=>{
  let code = prompt("Clave admin");
  if(code==="1234"){
    document.getElementById("adminPanel").style.display="flex";
  }
};

window.guardarProducto = async function(){
  let nombre = admNombre.value;
  let precio = +admPrecio.value;
  let stock = +admStock.value;

  if(!nombre || !precio) return alert("Datos inválidos");

  await addDoc(collection(db,"productos"),{
    nombre,precio,stock
  });

  cargarProductos();
}

// ================= UI =================
window.abrirApp = function(){
  document.getElementById("catalogo-overlay").classList.add("active");
}
window.cerrarApp = function(){
  document.getElementById("catalogo-overlay").classList.remove("active");
}

// ================= INIT =================
window.onload = ()=>{
  carrito = JSON.parse(localStorage.getItem("carrito")||"[]");
  actualizarContador();
  cargarProductos();
}

// ================= PWA =================
if("serviceWorker" in navigator){
  navigator.serviceWorker.register("sw.js");
}

</script>

</body>
</html>
