<!DOCTYPE html>
<html lang="es">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0, viewport-fit=cover">
    <title>E_M_P_G | Smart App</title>

    <link rel="manifest" href="manifest.json">
    <meta name="theme-color" content="#0f172a">
    <meta name="apple-mobile-web-app-capable" content="yes">

    <style>
        :root {
            --dark: #0f172a;
            --accent: #3b82f6;
            --ws: #25d366;
            --bg: #f1f5f9;
        }

        * {
            box-sizing: border-box;
            -webkit-tap-highlight-color: transparent;
            transition: all .25s ease;
        }

        body, html {
            margin: 0; padding: 0; height: 100%;
            font-family: 'Segoe UI', system-ui, sans-serif;
            background: var(--bg); overflow: hidden;
        }

        /* PANTALLA DE INICIO */
        .main-screen {
            height: 100vh; display: flex; align-items: center;
            justify-content: center; padding: 20px;
        }

        .card-inicio {
            background: white; padding: 40px 25px; border-radius: 30px;
            box-shadow: 0 20px 50px rgba(0,0,0,0.08); text-align: center;
            width: 100%; max-width: 380px;
        }

        .btn-abrir {
            background: linear-gradient(135deg, var(--dark), #1e293b);
            color: white; border: none; padding: 18px; border-radius: 50px;
            font-weight: bold; width: 100%; cursor: pointer; font-size: 1rem;
        }

        /* OVERLAY DINÁMICO */
        #catalogo-overlay {
            position: fixed; inset: 0; background: #f8fafc;
            transform: translateY(100%); z-index: 9999;
            display: flex; flex-direction: column;
        }

        #catalogo-overlay.active { transform: translateY(0); }

        /* HEADER & TABS */
        .header {
            padding: 18px; background: white; display: flex;
            justify-content: space-between; align-items: center;
            box-shadow: 0 5px 10px rgba(0,0,0,0.05);
        }

        .tabs { display: flex; padding: 10px; gap: 10px; background: white; }
        .tab {
            flex: 1; padding: 12px; border: none; border-radius: 14px;
            font-weight: bold; background: #e2e8f0; color: #64748b; cursor: pointer;
        }
        .tab.active { background: var(--dark); color: white; }

        /* CONTENIDO */
        .content { flex: 1; overflow-y: auto; padding: 20px; }

        /* CATEGORÍAS Y GRID */
        .brand-title {
            font-size: 0.75rem; font-weight: 800; color: var(--accent);
            text-transform: uppercase; letter-spacing: 1.5px;
            margin: 25px 0 10px 5px; display: block;
        }

        .grid { display: grid; grid-template-columns: 1fr 1fr; gap: 15px; }

        .card-prod {
            background: white; border-radius: 20px; padding: 12px;
            box-shadow: 0 8px 20px rgba(0,0,0,0.04); border: 1px solid #f1f5f9;
        }

        .img-placeholder { height: 110px; border-radius: 12px; background: #f1f5f9; margin-bottom: 8px; }
        .price { font-weight: 800; color: var(--dark); display: block; margin-bottom: 8px; }

        /* BOTONES */
        .btn-ws {
            background: var(--ws); color: white; border: none;
            padding: 10px; border-radius: 10px; width: 100%; font-weight: bold; cursor: pointer;
        }

        .btn-del { background: #ff4757; color: white; border: none; margin-top: 5px; border-radius: 5px; width: 100%; padding: 5px; cursor: pointer; font-size: 0.7rem; }

        /* AGENDA */
        .booking-card { background: white; padding: 25px; border-radius: 25px; box-shadow: 0 8px 20px rgba(0,0,0,0.05); }
        input, select { width: 100%; padding: 12px; margin: 8px 0 15px; border-radius: 12px; border: 1px solid #ddd; }

        /* ADMIN PANEL */
        #adminPanel {
            position: fixed; bottom: 0; left: 0; width: 100%; background: white;
            padding: 25px; display: none; z-index: 10000;
            border-radius: 25px 25px 0 0; box-shadow: 0 -10px 40px rgba(0,0,0,0.2);
        }

        button:active { transform: scale(.96); }
    </style>
</head>
<body>

    <div class="main-screen">
        <div class="card-inicio">
            <h1 style="margin-bottom: 5px;">E_M_P_G</h1>
            <p style="color: #64748b;">Smart Digital Catalog</p>
            <button class="btn-abrir" onclick="toggleApp(true)">Explorar</button>
        </div>
    </div>

    <div id="catalogo-overlay">
        <div class="header">
            <span id="logoAdmin"><b>E_M_P_G</b></span>
            <div onclick="toggleApp(false)" style="font-size: 24px; cursor: pointer;">✕</div>
        </div>

        <div class="tabs">
            <button class="tab active" id="tabP" onclick="switchView('prod')">Productos</button>
            <button class="tab" id="tabS" onclick="switchView('serv')">Servicios</button>
        </div>

        <div class="content" id="mainContent">
            <div id="prodView"></div>

            <div id="servView" style="display:none;">
                <div class="booking-card">
                    <h3 style="margin-top:0">Agendar Cita</h3>
                    <label>Servicio:</label>
                    <select id="citaTipo">
                        <option>Desarrollo Full-Stack</option>
                        <option>Consultoría de Datos</option>
                        <option>Mantenimiento Técnico</option>
                    </select>
                    <label>Fecha y Hora:</label>
                    <input type="date" id="citaFecha">
                    <input type="time" id="citaHora">
                    <button class="btn-ws" onclick="bookNow()">Confirmar Cita 📅</button>
                </div>
            </div>
        </div>
    </div>

    <div id="adminPanel">
        <div style="display:flex; justify-content:space-between; align-items:center; margin-bottom:15px;">
            <b>Panel de Gestión</b>
            <button onclick="closeAdmin()" style="border:none; background:none; font-weight:bold;">Cerrar</button>
        </div>
        <input type="text" id="admNombre" placeholder="Nombre del producto">
        <input type="number" id="admPrecio" placeholder="Precio $">
        <select id="admMarca">
            <option value="Marca 1">Marca 1</option>
            <option value="Marca 2">Marca 2</option>
            <option value="Marca 3">Marca 3</option>
            <option value="Marca 4">Marca 4</option>
        </select>
        <button onclick="saveProduct()" class="btn-ws">Guardar Producto</button>
    </div>

    <script>
        const phone = "52712XXXXXXX"; // Tu número aquí
        const secret = "1234";
        let isAdmin = false;

        function toggleApp(show) {
            document.getElementById('catalogo-overlay').classList.toggle('active', show);
        }

        function switchView(view) {
            document.getElementById('prodView').style.display = view === 'prod' ? 'block' : 'none';
            document.getElementById('servView').style.display = view === 'serv' ? 'block' : 'none';
            document.getElementById('tabP').classList.toggle('active', view === 'prod');
            document.getElementById('tabS').classList.toggle('active', view === 'serv');
        }

        /* LOGO ADMIN TRIGGER */
        let timer;
        const logo = document.getElementById("logoAdmin");
        logo.addEventListener("mousedown", () => timer = setTimeout(openAdmin, 2000));
        logo.addEventListener("touchstart", () => timer = setTimeout(openAdmin, 2000));
        logo.addEventListener("mouseup", () => clearTimeout(timer));
        logo.addEventListener("touchend", () => clearTimeout(timer));

        function openAdmin() {
            if(prompt("Código Admin:") === secret) {
                isAdmin = true;
                document.getElementById("adminPanel").style.display = "block";
                render();
            }
        }

        function closeAdmin() {
            isAdmin = false;
            document.getElementById("adminPanel").style.display = "none";
            render();
        }

        /* GESTIÓN DE DATOS */
        function saveProduct() {
            const nombre = document.getElementById("admNombre").value;
            const precio = document.getElementById("admPrecio").value;
            const marca = document.getElementById("admMarca").value;

            if(!nombre || !precio) return alert("Faltan datos");

            let prods = JSON.parse(localStorage.getItem("db_empg")) || [];
            prods.push({ id: Date.now(), nombre, precio, marca });
            localStorage.setItem("db_empg", JSON.stringify(prods));
            
            document.getElementById("admNombre").value = "";
            document.getElementById("admPrecio").value = "";
            render();
        }

        function deleteItem(id) {
            let prods = JSON.parse(localStorage.getItem("db_empg")).filter(p => p.id !== id);
            localStorage.setItem("db_empg", JSON.stringify(prods));
            render();
        }

        function render() {
            const container = document.getElementById("prodView");
            container.innerHTML = "";
            let prods = JSON.parse(localStorage.getItem("db_empg")) || [];

            // Agrupar por marcas automáticamente
            const marcas = ["Marca 1", "Marca 2", "Marca 3", "Marca 4"];
            
            marcas.forEach(m => {
                const filtered = prods.filter(p => p.marca === m);
                if(filtered.length > 0 || isAdmin) {
                    container.innerHTML += `<span class="brand-title">${m}</span>`;
                    let grid = document.createElement("div");
                    grid.className = "grid";
                    
                    filtered.forEach(p => {
                        grid.innerHTML += `
                            <div class="card-prod">
                                <div class="img-placeholder"></div>
                                <h4 style="margin:0; font-size:0.9rem;">${p.nombre}</h4>
                                <span class="price">$${p.precio}</span>
                                <button class="btn-ws" onclick="window.open('https://wa.me/${phone}?text=Me interesa ${p.nombre}')">Pedir</button>
                                ${isAdmin ? `<button class="btn-del" onclick="deleteItem(${p.id})">Borrar</button>` : ''}
                            </div>
                        `;
                    });
                    container.appendChild(grid);
                }
            });
        }

        function bookNow() {
            const t = document.getElementById("citaTipo").value;
            const f = document.getElementById("citaFecha").value;
            const h = document.getElementById("citaHora").value;
            if(!f || !h) return alert("Completa fecha y hora");
            window.open(`https://wa.me/${phone}?text=Cita: ${t} el ${f} a las ${h}`);
        }

        window.onload = render;
    </script>
</body>
</html>
