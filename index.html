<!DOCTYPE html>
<html lang="es">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0, viewport-fit=cover">
<title>DIANA PLATA | Beauty Studio</title>

<link rel="manifest" href="manifest.json">

<style>
:root {
--bg: #F8F9FC;
--white: #FFFFFF;
--dark: #1E1E2F;
--gold: #C5A059;
--gold-dark: #A07E3C;
--gold-soft: #E9D6B0;
--border: #EAECF0;
}

body{
margin:0;
font-family:'Inter',sans-serif;
background:var(--bg);
color:var(--dark);
}

/* ================= INICIO ================= */
.main-screen{
height:100vh;
display:flex;
align-items:center;
justify-content:center;
background:linear-gradient(145deg,#fff,#f3f2f0);
}

.card-inicio{
padding:50px;
border-radius:40px;
background:rgba(255,255,255,.95);
box-shadow:0 20px 40px rgba(0,0,0,.08);
text-align:center;
}

.card-inicio h1{
font-family:'Playfair Display',serif;
color:var(--gold-dark);
letter-spacing:1px;
}

.btn-main{
margin-top:30px;
background:var(--gold);
border:none;
padding:14px 30px;
border-radius:50px;
color:white;
font-weight:600;
cursor:pointer;
}

/* ================= APP ================= */
#catalogo-overlay{
position:fixed;
inset:0;
background:var(--bg);
transform:translateY(100%);
transition:.4s cubic-bezier(.2,.9,.3,1.1);
display:flex;
flex-direction:column;
}

#catalogo-overlay.active{
transform:translateY(0);
}

/* HEADER */
.header{
padding:16px 20px;
background:var(--white);
display:flex;
justify-content:space-between;
align-items:center;
border-bottom:1px solid var(--border);
}

#logoAdmin{
font-family:'Playfair Display',serif;
font-size:1.4rem;
color:var(--gold-dark);
cursor:pointer;
}

/* BUSCADOR */
.search{
margin:12px;
padding:12px;
border-radius:30px;
border:1px solid var(--border);
}

/* GRID */
.grid{
display:grid;
grid-template-columns:1fr 1fr;
gap:16px;
padding:16px;
}

/* CARD PRODUCTO */
.card-prod{
background:var(--white);
border-radius:24px;
padding:14px;
box-shadow:0 6px 18px rgba(0,0,0,.05);
transition:.2s;
}

.card-prod:hover{
transform:translateY(-3px);
}

.img-prod{
width:100%;
height:120px;
border-radius:16px;
background:#eee;
margin-bottom:10px;
}

.precio{
font-weight:700;
color:var(--gold-dark);
}

.stock{
font-size:.7rem;
background:#eee;
padding:4px 10px;
border-radius:20px;
}

.btn-add{
margin-top:10px;
background:var(--gold-soft);
border:none;
padding:8px;
border-radius:30px;
width:100%;
cursor:pointer;
}

/* CARRITO */
.cart-float{
position:fixed;
bottom:25px;
right:20px;
background:var(--gold);
color:white;
width:60px;
height:60px;
border-radius:50%;
display:flex;
align-items:center;
justify-content:center;
font-size:1.5rem;
box-shadow:0 10px 20px rgba(0,0,0,.2);
cursor:pointer;
}

.cart-count{
position:absolute;
top:-5px;
right:-5px;
background:red;
color:white;
font-size:.7rem;
padding:4px 8px;
border-radius:20px;
}

/* MODAL */
.modal{
position:fixed;
inset:0;
background:rgba(0,0,0,.4);
display:none;
align-items:center;
justify-content:center;
}

.modal-content{
background:white;
padding:20px;
border-radius:30px;
width:90%;
max-width:400px;
}

/* TICKET */
.ticket{
font-family:monospace;
background:#FCFAF7;
padding:10px;
border-radius:10px;
}

/* RESPONSIVE */
@media(max-width:600px){
.grid{grid-template-columns:1fr;}
}
</style>
</head>

<body>

<div class="main-screen">
<div class="card-inicio">
<h1>DIANA PLATA</h1>
<p>Beauty Studio</p>
<button class="btn-main" onclick="abrirApp()">Entrar</button>
</div>
</div>

<div id="catalogo-overlay">

<div class="header">
<span id="logoAdmin">DIANA PLATA</span>
<button onclick="cerrarApp()">Cerrar</button>
</div>

<input id="searchInput" class="search" placeholder="Buscar..." oninput="renderCatalogo()">

<div id="catalogo-container" class="grid"></div>

<div class="cart-float" onclick="abrirCarrito()">
🛒 <span id="cartCount" class="cart-count">0</span>
</div>

</div>

<!-- MODAL -->
<div id="modalCarrito" class="modal">
<div class="modal-content">
<h3>Tu pedido</h3>
<div id="ticket" class="ticket"></div>

<input id="custNombre" placeholder="Nombre">
<input id="custDireccion" placeholder="Dirección">

<button onclick="enviarPedido()">Enviar pedido</button>
<button onclick="cerrarCarrito()">Cerrar</button>
</div>
</div>

<script type="module">

import { initializeApp } from "https://www.gstatic.com/firebasejs/10.12.2/firebase-app.js";
import { getFirestore, collection, addDoc, getDocs } from "https://www.gstatic.com/firebasejs/10.12.2/firebase-firestore.js";

const firebaseConfig = { 
  apiKey: "AIzaSyCvrTlz7ewQlZBkTadgB9mxarMMJSvSp_A",
  authDomain: "dianapg-99037.firebaseapp.com",
  projectId: "dianapg-99037",
  storageBucket: "dianapg-99037.firebasestorage.app",
  messagingSenderId: "237058553544",
  appId: "1:237058553544:web:62caa7960d879394da57fd"
};

const app = initializeApp(firebaseConfig);
const db = getFirestore(app);

let productos=[];
let carrito=[];

/* CARGAR */
async function cargarProductos(){
const snap = await getDocs(collection(db,"productos"));
productos=[];
snap.forEach(d=>productos.push({id:d.id,...d.data()}));
renderCatalogo();
}

/* RENDER */
window.renderCatalogo=function(){
let html="";
productos.forEach(p=>{
html+=`
<div class="card-prod">
<div class="img-prod"></div>
<div class="stock">Stock: ${p.stock}</div>
<p>${p.nombre}</p>
<div class="precio">$${p.precio}</div>
<button class="btn-add" onclick="addToCart('${p.id}')">Agregar</button>
</div>`;
});
catalogo-container.innerHTML=html;
}

/* CARRITO */
window.addToCart=function(id){
let p=productos.find(x=>x.id===id);
carrito.push(p);
localStorage.setItem("carrito",JSON.stringify(carrito));
cartCount.innerText=carrito.length;
}

window.abrirCarrito=function(){
let html="";
carrito.forEach(p=>html+=`${p.nombre} $${p.precio}<br>`);
ticket.innerHTML=html;
modalCarrito.style.display="flex";
}

window.cerrarCarrito=function(){
modalCarrito.style.display="none";
}

/* PEDIDO */
window.enviarPedido=async function(){
await addDoc(collection(db,"pedidos"),{
nombre:custNombre.value,
direccion:custDireccion.value,
carrito
});
alert("Pedido enviado");
}

/* UI */
window.abrirApp=()=>catalogo-overlay.classList.add("active");
window.cerrarApp=()=>catalogo-overlay.classList.remove("active");

/* INIT */
window.onload=()=>{
carrito=JSON.parse(localStorage.getItem("carrito")||"[]");
cartCount.innerText=carrito.length;
cargarProductos();
}

/* PWA */
if("serviceWorker" in navigator){
navigator.serviceWorker.register("sw.js");
}

</script>
</body>
</html>
