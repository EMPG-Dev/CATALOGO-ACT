<!DOCTYPE html>
<html lang="es">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0, maximum-scale=1.0, user-scalable=no, viewport-fit=cover">
    <title>DIANA PLATA | Studio</title>
    <link rel="manifest" href="manifest.json">
    <meta name="theme-color" content="#0f172a">

    <style>
        :root {
            --dark: #0f172a; --mid: #1e293b; --accent: #3b82f6; --accent2: #2563eb;
            --ws: #16a34a; --danger: #dc2626; --bg: #f1f5f9; --card: #ffffff;
            --text: #0f172a; --muted: #64748b; --border: #e2e8f0;
        }
        *,*::before,*::after{box-sizing:border-box;margin:0;padding:0;-webkit-tap-highlight-color:transparent}
        html,body{height:100%;font-family:'Segoe UI',sans-serif;background:var(--bg);color:var(--text);overflow:hidden}

        /* Fondo Animado */
        @keyframes gradientBG { 0% { background-position: 0% 50%; } 50% { background-position: 100% 50%; } 100% { background-position: 0% 50%; } }
        .main-screen {
            height: 100dvh; display: flex; align-items: center; justify-content: center; padding: 24px;
            background: linear-gradient(-45deg, #0f172a, #1e3a8a, #1e293b, #3b82f6);
            background-size: 400% 400%; animation: gradientBG 15s ease infinite;
        }

        .card-inicio{background:rgba(255,255,255,0.06);border:1px solid rgba(255,255,255,0.1);backdrop-filter:blur(24px);padding:44px 28px;border-radius:28px;text-align:center;width:100%;max-width:380px}
        .btn-entrar{display:block;width:100%;padding:17px;background:var(--accent);color:#fff;border:none;border-radius:50px;font-size:1rem;font-weight:700;margin-top:20px}

        /* Overlay Catálogo */
        #catalogo-overlay{position:fixed;inset:0;background:var(--bg);z-index:9999;transform:translateY(100%);transition:0.4s cubic-bezier(0.32,0.72,0,1);display:flex;flex-direction:column}
        #catalogo-overlay.active{transform:translateY(0)}

        .header{padding:15px;background:var(--dark);display:flex;justify-content:space-between;align-items:center;color:#fff}
        .search-bar{width:calc(100% - 30px);padding:10px 15px;border-radius:12px;border:none;background:rgba(255,255,255,0.1);color:#fff;margin:10px 15px}

        .content{flex:1;overflow-y:auto;padding:15px}
        .grid{display:grid;grid-template-columns:1fr 1fr;gap:12px}
        .card-prod{background:var(--card);border-radius:18px;padding:12px;border:1px solid var(--border);position:relative}
        .img-prod{width:100%;height:100px;border-radius:10px;object-fit:cover;margin-bottom:8px}

        /* Boton Flotante Carrito */
        .cart-float{position:fixed;bottom:25px;right:20px;background:var(--accent);color:#fff;width:60px;height:60px;border-radius:50%;display:flex;align-items:center;justify-content:center;box-shadow:0 8px 20px rgba(0,0,0,0.2);z-index:10000}
        .cart-count{position:absolute;top:0;right:0;background:var(--danger);font-size:0.7rem;padding:4px 8px;border-radius:20px}

        /* Modal Ticket */
        .modal{position:fixed;inset:0;background:rgba(0,0,0,0.7);z-index:20000;display:none;align-items:center;justify-content:center;padding:20px}
        .modal-content{background:#fff;width:100%;max-width:400px;border-radius:25px;padding:25px;max-height:85vh;overflow-y:auto}
        .ticket{font-family:'Courier New', Courier, monospace;background:#f8f9fa;padding:15px;border:1px dashed #ccc;margin:15px 0}
        
        input, select{width:100%;padding:12px;margin-bottom:10px;border-radius:10px;border:1.5px solid var(--border)}
        .btn-ws{background:var(--ws);color:#fff;width:100%;padding:15px;border:none;border-radius:12px;font-weight:700;cursor:pointer}
        .btn-add{background:var(--accent);color:#fff;border:none;width:100%;padding:8px;border-radius:8px;font-weight:700}

        #toast{position:fixed;bottom:100px;left:50%;transform:translateX(-50%);background:#333;color:#fff;padding:10px 20px;border-radius:20px;opacity:0;transition:0.3s;z-index:99999}
    </style>
</head>
<body>

    <div class="main-screen">
        <div class="card-inicio">
            <h1 style="color:#fff;letter-spacing:5px">DIANA PLATA</h1>
            <p style="color:rgba(255,255,255,0.6)">Studio & Business Store</p>
            <button class="btn-entrar" onclick="abrirApp()">Ver Catálogo</button>
        </div>
    </div>

    <div id="catalogo-overlay">
        <div class="header">
            <span id="logoAdmin" style="font-weight:900; cursor:pointer">E_M_P_G</span>
            <button onclick="cerrarApp()" style="background:rgba(255,255,255,0.1);border:none;color:#fff;padding:5px 12px;border-radius:20px">Cerrar</button>
        </div>
        
        <input type="text" id="searchInput" class="search-bar" placeholder="Buscar en catálogo..." oninput="render()">

        <div class="tabs" style="display:flex;gap:8px;padding:10px 14px;background:var(--dark)">
            <button class="tab" id="tabP" onclick="cambiarVista('prod')" style="flex:1;padding:11px;border:none;border-radius:12px;font-weight:700">Productos</button>
            <button class="tab" id="tabS" onclick="cambiarVista('serv')" style="flex:1;padding:11px;border:none;border-radius:12px;font-weight:700">Servicios</button>
        </div>
        
        <div class="content">
            <div id="prodView">
                <div id="catalogo-container"></div>
            </div>

            <div id="servView" style="display:none;">
                <div class="card-prod" style="padding:20px">
                    <h3 style="margin-bottom:15px">Agendar Cita</h3>
                    <select id="citaTipo">
                        <option>Facial</option>
                        <option>Corporal</option>
                        <option>Diseño de Ceja</option>
                        <option>Consultoría</option>
                    </select>
                    <input type="date" id="citaFecha">
                    <button class="btn-ws" onclick="confirmarCita()">Confirmar por WhatsApp</button>
                </div>
            </div>
        </div>

        <div class="cart-float" id="cartFloatBtn" onclick="abrirCarrito()">
            🛒 <span class="cart-count" id="cartCount">0</span>
        </div>
    </div>

    <div id="modalCarrito" class="modal">
        <div class="modal-content">
            <h3>Tu Pedido</h3>
            <div id="ticketArea" class="ticket"></div>
            <p style="font-size:0.8rem; font-weight:700; margin-bottom:10px">DATOS DE ENTREGA:</p>
            <input type="text" id="custNombre" placeholder="Nombre completo">
            <input type="text" id="custDireccion" placeholder="Dirección / Ubicación">
            <button class="btn-ws" onclick="enviarPedido()">Enviar Ticket a WhatsApp</button>
            <button onclick="cerrarCarrito()" style="width:100%;background:none;border:none;margin-top:15px;color:var(--muted)">Volver</button>
        </div>
    </div>

    <div id="adminPanel" class="modal">
        <div class="modal-content">
            <h4>Panel Admin</h4>
            <input type="text" id="admNombre" placeholder="Nombre">
            <input type="number" id="admPrecio" placeholder="Precio">
            <input type="file" id="admFile" accept="image/*">
            <select id="admMarca">
                <option value="TERRAMAR">TERRAMAR</option>
                <option value="FARMASI">FARMASI</option>
                <option value="YANBAL">YANBAL</option>
                <option value="OTRO">OTRO</option>
            </select>
            <button class="btn-add" onclick="guardarProducto()">Guardar</button>
            <button onclick="cerrarAdmin()" style="width:100%;border:none;background:none;margin-top:10px">Salir</button>
        </div>
    </div>

    <div id="toast"></div>

    <script>
        var CONFIG = { 
            phone: "527121919227", 
            secretCode: "DAYANA123456", 
            tienda: "DIANA PLATA | Studio",
            marcas: ["TERRAMAR", "FARMASI", "YANBAL", "OTRO"]
        };

        var carrito = [];
        var isAdmin = false;
        var vistaActual = 'prod';

        function abrirApp() { document.getElementById("catalogo-overlay").classList.add("active"); cambiarVista('prod'); }
        function cerrarApp() { document.getElementById("catalogo-overlay").classList.remove("active"); }

        function cambiarVista(v) {
            vistaActual = v;
            document.getElementById("prodView").style.display = v === "prod" ? "block" : "none";
            document.getElementById("servView").style.display = v === "serv" ? "block" : "none";
            document.getElementById("cartFloatBtn").style.display = v === "prod" ? "flex" : "none";
            
            document.getElementById("tabP").style.background = v === "prod" ? "var(--accent)" : "rgba(255,255,255,0.07)";
            document.getElementById("tabP").style.color = v === "prod" ? "#fff" : "rgba(255,255,255,0.45)";
            document.getElementById("tabS").style.background = v === "serv" ? "var(--accent)" : "rgba(255,255,255,0.07)";
            document.getElementById("tabS").style.color = v === "serv" ? "#fff" : "rgba(255,255,255,0.45)";
            render();
        }

        function agregarAlCarrito(id) {
            var p = getProds().find(item => item.id === id);
            carrito.push(p);
            document.getElementById("cartCount").textContent = carrito.length;
            toast("Agregado al ticket");
        }

        function abrirCarrito() {
            if (carrito.length === 0) return toast("Carrito vacío");
            document.getElementById("modalCarrito").style.display = "flex";
            dibujarTicket();
        }

        function cerrarCarrito() { document.getElementById("modalCarrito").style.display = "none"; }

        function dibujarTicket() {
            var total = 0;
            var html = `<b>${CONFIG.tienda}</b><br>-------------------------<br>`;
            carrito.forEach(p => {
                html += `${p.nombre.substring(0,18)} $${p.precio}<br>`;
                total += parseFloat(p.precio);
            });
            html += `-------------------------<br><b>TOTAL: $${total.toLocaleString()}</b><br><br><small>Entrega: Por confirmar</small>`;
            document.getElementById("ticketArea").innerHTML = html;
        }

        function enviarPedido() {
            var n = document.getElementById("custNombre").value;
            var d = document.getElementById("custDireccion").value;
            if(!n || !d) return toast("Faltan tus datos");
            var total = 0;
            var msg = `*ORDEN DE COMPRA - ${CONFIG.tienda}*\n\n*Cliente:* ${n}\n*Dir:* ${d}\n----------\n`;
            carrito.forEach(p => { msg += `- ${p.nombre}: $${p.precio}\n`; total += parseFloat(p.precio); });
            msg += `----------\n*TOTAL: $${total}*\n\n_Confirmar entrega con el admin._`;
            window.open(`https://wa.me/${CONFIG.phone}?text=${encodeURIComponent(msg)}`);
            carrito = []; document.getElementById("cartCount").textContent = "0"; cerrarCarrito();
        }

        function getProds() { return JSON.parse(localStorage.getItem("empg_v2")) || []; }
        function setProds(arr) { localStorage.setItem("empg_v2", JSON.stringify(arr)); }

        function render() {
            var container = document.getElementById("catalogo-container");
            var query = document.getElementById("searchInput").value.toLowerCase();
            container.innerHTML = "";
            if(vistaActual !== 'prod') return;

            CONFIG.marcas.forEach(marca => {
                var items = getProds().filter(p => p.marca === marca && p.nombre.toLowerCase().includes(query));
                if (items.length === 0 && !isAdmin) return;
                var sec = document.createElement("div");
                sec.innerHTML = `<h5 style="margin:20px 0 10px; color:var(--accent); font-size:0.7rem; text-transform:uppercase">${marca}</h5><div class="grid"></div>`;
                var grid = sec.querySelector(".grid");
                items.forEach(p => {
                    var div = document.createElement("div");
                    div.className = "card-prod";
                    div.innerHTML = `<img src="${p.imagen||''}" class="img-prod"><p style="font-size:0.8rem;font-weight:700">${p.nombre}</p><b>$${p.precio}</b><button class="btn-add" onclick="agregarAlCarrito(${p.id})">+ Carrito</button>${isAdmin?`<button onclick="eliminar(${p.id})" style="color:red;border:none;background:none;width:100%;font-size:0.6rem;margin-top:5px">Eliminar</button>`:''}`;
                    grid.appendChild(div);
                });
                container.appendChild(sec);
            });
        }

        function guardarProducto() {
            var f = document.getElementById("admFile").files[0];
            const s = (img) => {
                var a = getProds();
                a.push({ id: Date.now(), nombre: document.getElementById("admNombre").value, precio: document.getElementById("admPrecio").value, marca: document.getElementById("admMarca").value, imagen: img });
                setProds(a); cerrarAdmin(); render();
            };
            if(f){ var r=new FileReader(); r.onload=(e)=>s(e.target.result); r.readAsDataURL(f); } else { s(""); }
        }

        function eliminar(id) { if(confirm("¿Borrar?")){ setProds(getProds().filter(p=>p.id!==id)); render(); } }
        function confirmarCita() { var f=document.getElementById("citaFecha").value; if(!f) return toast("Pon la fecha"); window.open(`https://wa.me/${CONFIG.phone}?text=Cita+para+${document.getElementById("citaTipo").value}+el+${f}`); }

        var pT;
        document.getElementById("logoAdmin").addEventListener("mousedown", () => pT = setTimeout(() => { if(prompt("Pass:")===CONFIG.secretCode){ isAdmin=true; document.getElementById("adminPanel").style.display="flex"; render(); } }, 2000));
        function cerrarAdmin() { isAdmin=false; document.getElementById("adminPanel").style.display="none"; render(); }
        function toast(m) { var t=document.getElementById("toast"); t.textContent=m; t.style.opacity="1"; setTimeout(()=>t.style.opacity="0", 2000); }

        window.onload = () => { render(); };
    </script>
</body>
</html>
